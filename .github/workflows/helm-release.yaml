name: Release Charts

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'charts/helmchart/Chart.yaml'
      - 'charts/cronjob/Chart.yaml'
      - 'charts/cloudflare/Chart.yaml'
      - 'charts/vigil/Chart.yaml'
      - 'charts/cloudflare-ddns/Chart.yaml'
      - 'charts/pass2gh/Chart.yaml'
      - 'charts/rbac/Chart.yaml'

jobs:
  release:
    permissions:
      contents: write # to push chart release and create a release (helm/chart-releaser-action)
      packages: write # needed for ghcr access
      id-token: write # needed for keyless signing

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "clouddrove-ci"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: latest   

      - name: Helm package
        uses: stefanprodan/helm-gh-pages@master
        with:
          token: ${{ secrets.GITHUB }}
          charts_url: https://charts.clouddrove.com/
          charts_dir: ./charts
          # branch: master
          target_dir: ./charts
          index_dir: .
       
      - name: Releasing tags and publishing charts
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: charts
          charts_repo_url: https://charts.clouddrove.com/
          mark_as_latest: true
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB }}"

  oci-release:
    needs: release
    permissions:
      contents: read
      packages: write # push OCI charts to ghcr.io
      id-token: write # cosign keyless signing via OIDC

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR (helm)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Log in to GHCR (docker, for cosign)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package, push and sign charts (OCI)
        env:
          OCI_REPO: oci://ghcr.io/clouddrove/charts
        run: |
          set -euo pipefail
          mkdir -p /tmp/pkg
          for chart in charts/*/; do
            [ -f "${chart}Chart.yaml" ] || continue
            name=$(grep '^name:' "${chart}Chart.yaml" | awk '{print $2}')
            version=$(grep '^version:' "${chart}Chart.yaml" | awk '{print $2}')

            echo "::group::OCI publish ${name}-${version}"
            helm package "$chart" -d /tmp/pkg

            push_out=$(helm push "/tmp/pkg/${name}-${version}.tgz" "$OCI_REPO" 2>&1 | tee /dev/stderr)
            digest=$(echo "$push_out" | awk '/Digest:/ {print $NF}')

            cosign sign --yes "ghcr.io/clouddrove/charts/${name}@${digest}"
            echo "::endgroup::"
          done
