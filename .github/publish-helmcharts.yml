name: Publish Helm Charts to GitHub Pages

on:
  push:
    branches:
      - tree/gh-pages

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Package Helm Charts
        run: |
          mkdir -p packages
          helm package helmchart/charts/* -d packages
          helm repo index packages --url https://charts.clouddrove.com/

      - name: Copy ArtifactHub metadata
        run: cp helmchart/.artifacthub-repo.yml packages/

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages
        run: |
          git fetch origin gh-pages || git checkout --orphan gh-pages
          git worktree add gh-pages-temp gh-pages

          rm -rf gh-pages-temp/*
          cp -r packages/* gh-pages-temp/

          cd gh-pages-temp
          git add .
          git commit -m "Publish Helm charts [skip ci]" || echo "No changes to commit"
          git push origin gh-pages
