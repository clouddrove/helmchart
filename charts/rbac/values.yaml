# Add one entry per teammate, bot, or SSO group.
# `name` must be DNS-compatible (lowercase alphanumerics + '-' allowed); it is
# used to name the generated resources (sa-<name>, rb-<name>, ns-<name>).
#
# subjectKind selects the RoleBinding subject:
#   ServiceAccount (default) -> creates a ServiceAccount + token Secret and binds it.
#   Group | User            -> binds an existing IdP-provided identity (SSO bridge);
#                              no ServiceAccount or token Secret is created.
#                              `subject` (the literal IdP group/user name) is required.
#                              createNamespace defaults to false for Group/User.
members: []
