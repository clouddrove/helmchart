  #   namespace: clouddrove
  #   role: admin            # one of: view, edit, admin
  #   createNamespace: true
  #   # subjectKind: ServiceAccount   # default
  # - name: devops
  #   namespace: devops
  #   role: edit
  #   createNamespace: true
  # - name: platform-team
  #   subjectKind: Group     # SSO bridge: bind an IdP group, no SA/token minted
  #   subject: platform-team # literal group name as your IdP presents it
  #   namespace: platform    # must already exist (createNamespace defaults false)
  #   role: edit
